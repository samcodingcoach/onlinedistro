<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>APRIL - Modern Fashion</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style type="text/tailwindcss">
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .carousel-container {
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }
        .carousel-slide {
            scroll-snap-align: start;
            flex-shrink: 0;
            width: 100%;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d41152",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221016",
                        "foreground-light": "#1b0d12",
                        "foreground-dark": "#f8f6f6",
                        "secondary-light": "#9a4c66",
                        "secondary-dark": "#e0b8c6",
                        "surface-light": "#f3e7eb",
                        "surface-dark": "#3a212a"
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
</head>

<body class="font-display bg-background-light dark:bg-background-dark text-foreground-light dark:text-foreground-dark">
    <div class="relative flex min-h-screen w-full flex-col">

        <main class="flex-grow">




            <section class="container mx-auto px-4 sm:px-6 lg:px-8 py-10">
                <h2
                    class="text-foreground-light dark:text-foreground-dark text-2xl md:text-3xl font-bold leading-tight tracking-[-0.015em] mb-8">
                    Collection Highlights
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8">
                    <div
                        class="group relative overflow-hidden rounded-xl aspect-square shadow-sm border border-surface-light dark:border-surface-dark">
                        <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                            <source src="videos/video1.mp4" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                        <div class="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors"></div>
                        <div class="absolute bottom-6 left-6 right-6">
                            <h3 class="text-2xl font-bold text-white drop-shadow-md">The Modern Minimalist</h3>
                        </div>
                    </div>
                    <div
                        class="group relative overflow-hidden rounded-xl aspect-square shadow-sm border border-surface-light dark:border-surface-dark">
                        <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                            <source src="videos/video1.mp4" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                        <div class="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors"></div>
                        <div class="absolute bottom-6 left-6 right-6">
                            <h3 class="text-2xl font-bold text-white drop-shadow-md">Summer Romance '24</h3>
                        </div>
                    </div>
                </div>
            </section>
        </main>


    </div>

</body>

</html>
